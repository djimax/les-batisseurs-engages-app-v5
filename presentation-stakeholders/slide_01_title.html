<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Bâtisseurs Engagés - Nouvelles Fonctionnalités</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #F4F7F6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* Éléments géométriques de fond */
        .geometric-element {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            background: #FFC82E;
            top: -100px;
            right: -100px;
        }

        .circle-2 {
            width: 300px;
            height: 300px;
            background: #2E7D32;
            bottom: -50px;
            left: -100px;
        }

        /* Contenu principal */
        .content {
            position: relative;
            z-index: 10;
            margin-left: 120px;
            margin-right: 120px;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .title-section {
            margin-bottom: 40px;
        }

        .main-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 64px;
            font-weight: 700;
            color: #0A3224;
            line-height: 1.2;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .main-title-accent {
            color: #FFC82E;
            text-decoration: underline;
            text-decoration-thickness: 4px;
            text-underline-offset: 8px;
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #0A3224;
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .tagline {
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            font-weight: 500;
            color: #0A3224;
            margin-bottom: 50px;
            opacity: 0.8;
        }

        .date {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 500;
            color: #2E7D32;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Ligne de séparation */
        .separator {
            width: 80px;
            height: 4px;
            background: #FFC82E;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <!-- Éléments géométriques -->
        <div class="geometric-element circle-1"></div>
        <div class="geometric-element circle-2"></div>

        <!-- Contenu -->
        <div class="content">
            <div class="title-section">
                <div class="separator"></div>
                <h1 class="main-title">
                    Les Bâtisseurs<br>
                    <span class="main-title-accent">Engagés</span>
                </h1>
            </div>

            <h2 class="subtitle">Nouvelles Fonctionnalités 2026</h2>
            <p class="tagline">Amélioration de la Gestion d'Association</p>
            <p class="date">Juin 2026</p>
        </div>
    </div>
</body>
</html>
