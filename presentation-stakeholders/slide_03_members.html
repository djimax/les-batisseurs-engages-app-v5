<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Membres</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #F4F7F6;
            display: flex;
            flex-direction: column;
            padding-top: 60px;
            font-family: 'Poppins', sans-serif;
        }

        /* Titre */
        .header {
            margin-left: 120px;
            margin-right: 120px;
            margin-bottom: 40px;
        }

        .page-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #0A3224;
            margin-bottom: 10px;
            text-decoration: underline;
            text-decoration-color: #FFC82E;
            text-decoration-thickness: 4px;
            text-underline-offset: 8px;
        }

        /* Contenu comparatif */
        .comparison-container {
            margin-left: 120px;
            margin-right: 120px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            flex: 1;
        }

        .column {
            display: flex;
            flex-direction: column;
        }

        .column-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #0A3224;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 3px solid #FFC82E;
        }

        .column-title.before {
            color: #A0A0A0;
        }

        .column-title.after {
            color: #2E7D32;
        }

        .column-title.after::before {
            content: "✓ ";
            color: #2E7D32;
        }

        .list-item {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 500;
            color: #0A3224;
            margin-bottom: 18px;
            padding-left: 25px;
            position: relative;
            line-height: 1.5;
        }

        .list-item::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #A0A0A0;
            font-size: 20px;
        }

        .column.after .list-item::before {
            content: "✓";
            color: #2E7D32;
            font-weight: 700;
            font-size: 18px;
        }

        .column.after .list-item {
            color: #0A3224;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <!-- Titre -->
        <div class="header">
            <h1 class="page-title">Gestion des Membres - Avant/Après</h1>
        </div>

        <!-- Comparaison -->
        <div class="comparison-container">
            <!-- Avant -->
            <div class="column">
                <h3 class="column-title before">Avant</h3>
                <div class="list-item">Affichage en tableau simple</div>
                <div class="list-item">Pas de photos</div>
                <div class="list-item">Informations limitées</div>
            </div>

            <!-- Après -->
            <div class="column after">
                <h3 class="column-title after">Après</h3>
                <div class="list-item">Affichage en grille de cartes visuelles</div>
                <div class="list-item">Photos de profil pour chaque membre</div>
                <div class="list-item">Informations complètes (ID, rôle, statut, contact)</div>
                <div class="list-item">Recherche et filtrage avancé</div>
                <div class="list-item">Upload facile de photos</div>
            </div>
        </div>
    </div>
</body>
</html>
